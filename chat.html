<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>talkme | supabase powered</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-black: #0A0A0A;
      --neon-cyan: #00F0FF;
      --font-sf: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    }

    body {
      background: var(--primary-black);
      font-family: var(--font-sf);
      color: var(--neon-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .app-container {
      max-width: 1400px;
      width: 100%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 3rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 20px rgba(0,240,255,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 90vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid rgba(0,240,255,0.15);
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(180deg, #00F0FF, #00b8c4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      padding: 0.7rem 1.8rem;
      border-radius: 2.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sf);
    }

    .btn-primary {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 20px rgba(0,240,255,0.5);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #0A0A0A;
      border: 2px solid var(--neon-cyan);
      border-radius: 2.5rem;
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 50px rgba(0,240,255,0.3);
    }

    .modal h2 { text-align: center; margin-bottom: 1.5rem; }

    .input-group { margin-bottom: 1rem; }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .input-group input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      background: transparent;
      border: 1px solid rgba(0,240,255,0.4);
      border-radius: 2rem;
      color: var(--neon-cyan);
      font-family: var(--font-sf);
      font-size: 1rem;
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0,240,255,0.2);
    }

    .phone-input { display: flex; gap: 0.5rem; }
    .country-code { width: 80px !important; text-align: center; }

    .error-msg {
      color: #ff3366;
      font-size: 0.85rem;
      margin-top: 0.3rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .password-strength {
      height: 4px;
      background: rgba(0,240,255,0.2);
      border-radius: 2px;
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      transition: width 0.3s, background 0.3s;
    }

    .strength-weak { width: 33%; background: #ff3366; }
    .strength-medium { width: 66%; background: #ffaa00; }
    .strength-strong { width: 100%; background: #00ff88; }

    .main-content {
      display: flex;
      flex: 1;
      min-height: 600px;
    }

    .sidebar {
      width: 280px;
      background: rgba(5,5,5,0.8);
      border-right: 1px solid rgba(0,240,255,0.15);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .nav-item {
      padding: 0.9rem 1.4rem;
      border-radius: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid transparent;
    }

    .nav-item.active {
      background: rgba(0,240,255,0.1);
      border-color: rgba(0,240,255,0.4);
    }

    .central-panel {
      flex: 1;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .friends-list {
      background: rgba(0,240,255,0.03);
      border: 1px solid rgba(0,240,255,0.2);
      border-radius: 2rem;
      padding: 1.2rem;
      flex: 1;
    }

    .friend-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      margin-bottom: 0.5rem;
      background: rgba(0,240,255,0.05);
      border: 1px solid rgba(0,240,255,0.15);
      border-radius: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .friend-card:hover {
      background: rgba(0,240,255,0.1);
      border-color: rgba(0,240,255,0.4);
    }

    .friend-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--neon-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .friend-info { flex: 1; margin-left: 1rem; }
    .friend-name { font-weight: 600; }

    .chat-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,240,255,0.2);
      border-radius: 2rem;
      padding: 1.2rem;
      display: none;
      flex-direction: column;
      gap: 0.8rem;
      flex: 1;
    }

    .chat-box.active { display: flex; }

    .messages {
      flex: 1;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.5rem;
    }

    .msg {
      padding: 0.5rem 1rem;
      border-radius: 1.5rem;
      max-width: 75%;
      border: 1px solid rgba(0,240,255,0.3);
      background: rgba(0,240,255,0.08);
    }

    .msg.self {
      align-self: flex-end;
      background: rgba(0,240,255,0.18);
    }

    .input-row { display: flex; gap: 0.5rem; }

    .input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--neon-cyan);
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      color: var(--neon-cyan);
      outline: none;
      font-family: var(--font-sf);
    }

    .call-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(30px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      gap: 2rem;
    }

    .call-overlay.active { display: flex; }

    .video-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .video-container {
      width: 400px;
      height: 300px;
      background: #000;
      border: 2px solid var(--neon-cyan);
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,240,255,0.3);
      position: relative;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      bottom: 10px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      padding: 0.3rem 1rem;
      border-radius: 2rem;
    }

    .call-controls {
      display: flex;
      gap: 2rem;
      background: rgba(0,240,255,0.05);
      padding: 1rem 2.5rem;
      border-radius: 4rem;
      border: 1px solid rgba(0,240,255,0.3);
    }

    .ctrl-btn {
      background: rgba(0,240,255,0.1);
      border: none;
      color: var(--neon-cyan);
      font-size: 1.8rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn.end { background: #ff3366; color: white; }

    .incoming-call {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0A0A0A;
      border: 2px solid var(--neon-cyan);
      border-radius: 2rem;
      padding: 1.5rem 2.5rem;
      z-index: 2500;
      display: none;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,240,255,0.5);
    }

    .incoming-call.active { display: block; }

    .notification {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,240,255,0.15);
      backdrop-filter: blur(20px);
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      border: 1px solid var(--neon-cyan);
      z-index: 3000;
      display: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    .ringing-indicator {
      animation: pulse 1s infinite;
    }

    @media (max-width: 900px) {
      .main-content { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .video-container { width: 280px; height: 200px; }
    }
  </style>
</head>

  <script type="module">
    // ============ DEBUG MODE ============
    const DEBUG = true;
    function debugLog(...args) {
      if (DEBUG) {
        console.log('[talkme]', ...args);
      }
    }

    // ============ SUPABASE CONFIGURATION ============
    const SUPABASE_URL = 'https://pbrvxxdmiuobsrmrdbcw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_o5llzir6W8_tTnMX8TYn1w_DqfVXCP2';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============ AUDIO SYSTEM ============
    let audioContext = null;
    let ringingInterval = null;
    let ringingOscillator = null;

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    // Play message notification sound
    function playMessageSound() {
      try {
        const ctx = getAudioContext();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, ctx.currentTime);
        oscillator.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
        
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      } catch (err) {
        console.error('Error playing message sound:', err);
      }
    }

    // Play ringing sound (for caller)
    function playRingingSound() {
      try {
        const ctx = getAudioContext();
        
        function playTone(frequency, duration, startTime) {
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(frequency, startTime);
          
          gainNode.gain.setValueAtTime(0, startTime);
          gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
          gainNode.gain.linearRampToValueAtTime(0, startTime + duration - 0.05);
          
          oscillator.start(startTime);
          oscillator.stop(startTime + duration);
        }

        let time = ctx.currentTime;
        for (let i = 0; i < 2; i++) {
          playTone(440, 0.4, time);
          playTone(480, 0.4, time + 0.45);
          time += 1.5;
        }
        
        ringingInterval = setInterval(() => {
          if (ctx.state === 'suspended') ctx.resume();
          let t = ctx.currentTime;
          for (let i = 0; i < 2; i++) {
            playTone(440, 0.4, t);
            playTone(480, 0.4, t + 0.45);
            t += 1.5;
          }
        }, 3000);
        
      } catch (err) {
        console.error('Error playing ringing sound:', err);
      }
    }

    // Play incoming call sound (for receiver)
    function playIncomingCallSound() {
      try {
        const ctx = getAudioContext();
        
        function playTone(frequency, duration, startTime) {
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          oscillator.type = 'square';
          oscillator.frequency.setValueAtTime(frequency, startTime);
          
          gainNode.gain.setValueAtTime(0, startTime);
          gainNode.gain.linearRampToValueAtTime(0.4, startTime + 0.05);
          gainNode.gain.linearRampToValueAtTime(0, startTime + duration - 0.05);
          
          oscillator.start(startTime);
          oscillator.stop(startTime + duration);
        }

        let time = ctx.currentTime;
        for (let i = 0; i < 3; i++) {
          playTone(800, 0.2, time);
          playTone(1000, 0.2, time + 0.25);
          time += 0.7;
        }
        
        ringingInterval = setInterval(() => {
          if (ctx.state === 'suspended') ctx.resume();
          let t = ctx.currentTime;
          for (let i = 0; i < 3; i++) {
            playTone(800, 0.2, t);
            playTone(1000, 0.2, t + 0.25);
            t += 0.7;
          }
        }, 2000);
        
      } catch (err) {
        console.error('Error playing incoming call sound:', err);
      }
    }

    function stopRingingSounds() {
      if (ringingInterval) {
        clearInterval(ringingInterval);
        ringingInterval = null;
      }
      if (ringingOscillator) {
        try { ringingOscillator.stop(); } catch(e) {}
        ringingOscillator = null;
      }
    }

    function playBusyTone() {
      try {
        const ctx = getAudioContext();
        
        function playTone(frequency, duration, startTime) {
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(frequency, startTime);
          
          gainNode.gain.setValueAtTime(0, startTime);
          gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
          gainNode.gain.linearRampToValueAtTime(0, startTime + duration - 0.05);
          
          oscillator.start(startTime);
          oscillator.stop(startTime + duration);
        }

        let time = ctx.currentTime;
        for (let i = 0; i < 3; i++) {
          playTone(480, 0.25, time);
          time += 0.5;
        }
        
      } catch (err) {
        console.error('Error playing busy tone:', err);
      }
    }

    // ============ SECURITY UTILITIES ============
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function checkPasswordStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      
      if (score <= 2) return { strength: 'weak', class: 'strength-weak' };
      if (score <= 4) return { strength: 'medium', class: 'strength-medium' };
      return { strength: 'strong', class: 'strength-strong' };
    }

    // ============ SUPABASE REALTIME ============
    async function setupRealtimeSubscriptions() {
      if (!currentUser) return;
      
      callChannel = supabase.channel('call-signaling')
        .on('broadcast', { event: 'call-offer' }, (p) => {
          if (p.payload.to === currentUser.phone) handleIncomingCall(p.payload.from, p.payload.data);
        })
        .on('broadcast', { event: 'call-answer' }, (p) => {
          if (p.payload.to === currentUser.phone) handleCallAnswer(p.payload.data);
        })
        .on('broadcast', { event: 'ice-candidate' }, (p) => {
          if (p.payload.to === currentUser.phone) handleIceCandidate(p.payload.data);
        })
        .on('broadcast', { event: 'call-ended' }, (p) => {
          if (p.payload.to === currentUser.phone) handleRemoteHangup();
        })
        .on('broadcast', { event: 'call-rejected' }, (p) => {
          if (p.payload.to === currentUser.phone) handleCallRejected(p.payload.from);
        })
        .subscribe();

      messageChannel = supabase
        .channel('messages')
        .on('postgres_changes', { 
          event: 'INSERT', 
          schema: 'public', 
          table: 'messages', 
          filter: `receiver_id=eq.${currentUser.id}` 
        }, 
        async (payload) => {
          debugLog('New message received:', payload);
          
          // Play notification sound
          playMessageSound();
          
          // Get sender info
          const { data: sender } = await supabase
            .from('users')
            .select('name, phone')
            .eq('id', payload.new.sender_id)
            .single();
          
          // Show notification
          if (sender) {
            notify(`📨 ${sender.name || sender.phone}: ${payload.new.content}`);
          }
          
          // If chat is open with the sender, display the message
          if (activeChatFriend && sender && sender.phone === activeChatFriend) {
            addMessageToChat(payload.new.content, false);
          }
        })
        .subscribe();

      // Broadcast user online status
      callChannel.send({
        type: 'broadcast',
        event: 'user-status',
        payload: { phone: currentUser.phone, status: 'online' }
      });
    }

    async function acceptRequest(fromPhone) {
      if (!currentUser) {
        notify('Please login first');
        return;
      }

      try {
        debugLog('Accepting request from:', fromPhone);
        
        // Find the requesting user
        const { data: friend, error: friendError } = await supabase
          .from('users')
          .select('*')
          .eq('phone', fromPhone)
          .single();

        if (friendError || !friend) {
          console.error('Friend user not found:', friendError);
          notify('User not found in database');
          return;
        }

        debugLog('Found friend:', friend);

        // Check if already friends
        const { data: existingFriendship } = await supabase
          .from('friends')
          .select('*')
          .eq('user_id', currentUser.id)
          .eq('friend_id', friend.id)
          .maybeSingle();

        if (existingFriendship) {
          debugLog('Already friends, updating request status');
          await supabase
            .from('friend_requests')
            .update({ status: 'accepted' })
            .eq('from_phone', fromPhone)
            .eq('to_phone', currentUser.phone);
          
          notify('Already friends! 🤝');
          loadFriends();
          loadFriendRequests();
          return;
        }

        // Insert friendship records
        const { error: insertError1 } = await supabase
          .from('friends')
          .insert([{
            user_id: currentUser.id,
            friend_id: friend.id,
            status: 'accepted'
          }]);

        if (insertError1) {
          console.error('Error inserting friendship 1:', insertError1);
          notify('Error creating friendship: ' + insertError1.message);
          return;
        }

        const { error: insertError2 } = await supabase
          .from('friends')
          .insert([{
            user_id: friend.id,
            friend_id: currentUser.id,
            status: 'accepted'
          }]);

        if (insertError2) {
          console.error('Error inserting friendship 2:', insertError2);
          // Clean up first insert if second fails
          await supabase
            .from('friends')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('friend_id', friend.id);
          
          notify('Error creating friendship: ' + insertError2.message);
          return;
        }

        // Update the friend request status
        await supabase
          .from('friend_requests')
          .update({ status: 'accepted' })
          .eq('from_phone', fromPhone)
          .eq('to_phone', currentUser.phone);

        debugLog('Friend request accepted successfully');
        notify(`Now friends with ${friend.name || fromPhone}! 🤝`);
        
        await loadFriends();
        await loadFriendRequests();
        
      } catch (error) {
        console.error('Accept request error:', error);
        notify('Error accepting friend request: ' + error.message);
      }
    }

    async function loadChatHistory() {
      if (!currentUser || !activeChatFriend) return;
      
      const { data: friend } = await supabase.from('users').select('id').eq('phone', activeChatFriend).single();
      if (!friend) return;

      const { data: messages } = await supabase
        .from('messages')
        .select('*')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: true });

      const container = document.getElementById('messagesContainer');
      container.innerHTML = '';
      
      const relevant = messages?.filter(m => 
        (m.sender_id === currentUser.id && m.receiver_id === friend.id) ||
        (m.sender_id === friend.id && m.receiver_id === currentUser.id)
      ) || [];

      if (relevant.length > 0) {
        relevant.forEach(m => addMessageToChat(m.content, m.sender_id === currentUser.id));
      } else {
        container.innerHTML = '<div class="msg" style="align-self:center;">Start chatting!</div>';
      }
    }

    function addMessageToChat(text, isSelf) {
      const container = document.getElementById('messagesContainer');
      const div = document.createElement('div');
      div.className = isSelf ? 'msg self' : 'msg';
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

      if (!friend) return;

      await supabase.from('messages').insert({
        sender_id: currentUser.id,
        receiver_id: friend.id,

      addMessageToChat(text, true);
      document.getElementById('chatInput').value = '';

    async function startVideoCall(friendPhone) {
      if (!currentUser || isInCall) {
        notify('Already in a call');
        return;
      }

      isCaller = true;
      activeChatFriend = friendPhone;
      currentCallFriend = friendPhone;
      
      // Update remote label
      const friend = friends.find(f => f.phone === friendPhone);
      document.getElementById('remoteLabel').textContent = friend?.name || friendPhone;
      
      // Check if user is online
      const online = await isUserOnline(friendPhone);
      
      try {
        debugLog('Starting video call to:', friendPhone);
        
        // Get local media
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 640, height: 480 },
          audio: true 
        });
        
        document.getElementById('localVideo').srcObject = localStream;
        
        // Show call overlay immediately for caller
        document.getElementById('callOverlay').classList.add('active');
        isInCall = true;
        
        // Start playing ringing sound for caller
        if (online) {
          playRingingSound();
        } else {
          playBusyTone();
          notify('User appears to be offline');
          setTimeout(() => cleanupCall(), 3000);
          return;
        }

        // Create peer connection
        await createPeerConnection();
        
        // Add local tracks to peer connection
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });
        
        // Create and send offer
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        debugLog('Sending call offer');
        await callChannel.send({
          type: 'broadcast',
          event: 'call-offer',
          payload: {
            from: currentUser.phone,
            to: friendPhone,
            data: { sdp: offer }
          }
        });

        // Set timeout for call (60 seconds)
        callTimeout = setTimeout(() => {
          if (isInCall && !peerConnection?.remoteDescription) {
            notify('Call not answered');
            hangupCall();
          }
        }, 60000);
        
      } catch (err) {
        console.error('Error starting call:', err);
        notify('Error: Camera/mic access required');
        cleanupCall();
      }
    }

    window.startVideoCall = startVideoCall;

    async function createPeerConnection() {
      // Close existing connection if any
      if (peerConnection) {
        peerConnection.close();
      }
      
      peerConnection = new RTCPeerConnection(rtcConfig);
      
      // Handle ICE candidates
      peerConnection.onicecandidate = (event) => {
        if (event.candidate && currentCallFriend) {
          debugLog('Sending ICE candidate');
          callChannel.send({
            type: 'broadcast',
            event: 'ice-candidate',
            payload: {
              from: currentUser.phone,
              to: currentCallFriend,
              data: event.candidate
            }
          });
        }
      };
      
      // Handle incoming remote tracks
      peerConnection.ontrack = (event) => {
        debugLog('Received remote track');
        if (event.streams && event.streams[0]) {
          document.getElementById('remoteVideo').srcObject = event.streams[0];
        }
      };
      
      // Handle connection state changes
      peerConnection.onconnectionstatechange = () => {
        debugLog('Connection state:', peerConnection.connectionState);
        if (peerConnection.connectionState === 'connected') {
          stopRingingSounds();
          if (callTimeout) clearTimeout(callTimeout);
          notify('Call connected!');
        } else if (peerConnection.connectionState === 'failed' || 
                   peerConnection.connectionState === 'disconnected') {
          notify('Call connection lost');
          cleanupCall();
        }
      };
      
      // Handle ICE connection state
      peerConnection.oniceconnectionstatechange = () => {
        debugLog('ICE connection state:', peerConnection.iceConnectionState);
      };
      
      // Handle negotiation needed
      peerConnection.onnegotiationneeded = async () => {
        debugLog('Negotiation needed');
        if (isCaller) {
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          
          await callChannel.send({
            type: 'broadcast',
            event: 'call-offer',
            payload: {
              from: currentUser.phone,
              to: currentCallFriend,
              data: { sdp: offer }
            }
          });
        }
      };
    }

    function handleIncomingCall(from, data) {
      if (isInCall) {
        // Send reject if already in call
        callChannel.send({
          type: 'broadcast',
          event: 'call-rejected',
          payload: {
            from: currentUser.phone,
            to: from
          }
        });
        return;
      }
      
      debugLog('Incoming call from:', from);
      isCaller = false;
      currentCallFriend = from;
      window._pendingOffer = data;
      
      // Show incoming call UI with ringing
      const friend = friends.find(f => f.phone === from);
      document.getElementById('incomingCallerName').textContent = friend?.name || from;
      document.getElementById('remoteLabel').textContent = friend?.name || from;
      document.getElementById('incomingCall').classList.add('active');
      
      // Play incoming call sound for receiver
      playIncomingCallSound();
    }

    document.getElementById('acceptCallBtn').addEventListener('click', async () => {
      stopRingingSounds();
      document.getElementById('incomingCall').classList.remove('active');
      
      try {
        debugLog('Accepting call');
        
        // Get local media
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 640, height: 480 },
          audio: true 
        });
        
        document.getElementById('localVideo').srcObject = localStream;
        
        // Create peer connection
        await createPeerConnection();
        
        // Add local tracks
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });
        
        // Set remote description (the offer)
        await peerConnection.setRemoteDescription(
          new RTCSessionDescription(window._pendingOffer.sdp)
        );
        
        // Create answer
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        
        // Send answer
        debugLog('Sending call answer');
        await callChannel.send({
          type: 'broadcast',
          event: 'call-answer',
          payload: {
            from: currentUser.phone,
            to: currentCallFriend,
            data: { sdp: answer }
          }
        });
        
        // Show call overlay
        document.getElementById('callOverlay').classList.add('active');
        isInCall = true;
        
      } catch (err) {
        console.error('Error accepting call:', err);
        notify('Error: Camera/mic access required');
        cleanupCall();
      }
    });

    document.getElementById('rejectCallBtn').addEventListener('click', () => {
      stopRingingSounds();
      document.getElementById('incomingCall').classList.remove('active');
      
      debugLog('Rejecting call');
      callChannel.send({
        type: 'broadcast',
        event: 'call-rejected',
        payload: {
          from: currentUser.phone,
          to: currentCallFriend
        }
      });
      
      cleanupCall();
    });

    async function handleCallAnswer(data) {
      debugLog('Call answered');
      stopRingingSounds();
      if (callTimeout) clearTimeout(callTimeout);
      
      if (peerConnection) {
        try {
          await peerConnection.setRemoteDescription(
            new RTCSessionDescription(data.sdp)
          );
        } catch (err) {
          console.error('Error setting remote description:', err);
        }
      }
    }

    function handleIceCandidate(candidate) {
      if (peerConnection) {
        try {
          peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (err) {
          console.error('Error adding ICE candidate:', err);
        }
      }
    }

    function handleRemoteHangup() {
      stopRingingSounds();
      notify('Call ended by other party');
      cleanupCall();
    }

    function handleCallRejected(from) {
      stopRingingSounds();
      if (callTimeout) clearTimeout(callTimeout);
      playBusyTone();
      notify('Call declined');
      cleanupCall();
    }

    function hangupCall() {
      stopRingingSounds();
      if (callTimeout) clearTimeout(callTimeout);
      
      debugLog('Hanging up call');
      if (currentCallFriend) {
        callChannel.send({
          type: 'broadcast',
          event: 'call-ended',
          payload: {
            from: currentUser.phone,
            to: currentCallFriend
          }
        });
      }
      
      cleanupCall();
    }

    function cleanupCall() {
      stopRingingSounds();
      if (callTimeout) {
        clearTimeout(callTimeout);
        callTimeout = null;
      }
      
      // Close peer connection
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      
      // Stop local stream
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      
      // Clear video elements
      document.getElementById('localVideo').srcObject = null;
      document.getElementById('remoteVideo').srcObject = null;
      
      // Hide UI elements
      document.getElementById('callOverlay').classList.remove('active');
      document.getElementById('incomingCall').classList.remove('active');
      
      // Reset state
      isInCall = false;
      isCaller = false;
      currentCallFriend = null;
      window._pendingOffer = null;
    }

    // Call control buttons
    document.getElementById('hangupBtn').addEventListener('click', hangupCall);
    
    document.getElementById('toggleMicBtn').addEventListener('click', () => {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          document.getElementById('toggleMicBtn').textContent = audioTrack.enabled ? '🎙️' : '🔇';
        }
      }
    });
    
    document.getElementById('toggleCamBtn').addEventListener('click', () => {
      if (localStream) {
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) {
          videoTrack.enabled = !videoTrack.enabled;
          document.getElementById('toggleCamBtn').textContent = videoTrack.enabled ? '📸' : '🚫';
        }
      }
    });

    document.getElementById('startVideoCallBtn').addEventListener('click', () => {
      if (activeChatFriend) startVideoCall(activeChatFriend);
    });

    document.getElementById('homeTab').addEventListener('click', () => { showFriendsList(); displayFriends(); });
    document.getElementById('friendsTab').addEventListener('click', () => { showFriendsList(); displayFriends(); });
    document.getElementById('requestsTab').addEventListener('click', () => { showFriendsList(); });

    function updateUI() {
      if (currentUser) {
        document.getElementById('friendCount').textContent = friends.length;
        displayFriends();
      }
    }

    // Initialize
    debugLog('App initializing...');
    loadSession();

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
      if (isInCall) hangupCall();
      stopRingingSounds();
    });
  </script>
</body>
</html>
